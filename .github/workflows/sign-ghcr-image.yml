name: Sign GHCR image by digest

run-name: Sign ${{ inputs.version }} at ${{ inputs.digest }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to bind to the signature (for example, v0.1.0)
        required: true
        type: string
      digest:
        description: Immutable GHCR digest (sha256 followed by 64 lowercase hexadecimal characters)
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: sign-ghcr-image-${{ inputs.digest }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/luka-loehr/qwen3-tts-native
  CERTIFICATE_IDENTITY: https://github.com/luka-loehr/qwen3-tts-native/.github/workflows/sign-ghcr-image.yml@refs/heads/main
  CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com

jobs:
  sign:
    name: Sign and verify immutable image
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Validate the release request
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          IMAGE_DIGEST: ${{ inputs.digest }}
        run: |
          set -Eeuo pipefail

          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "This workflow must be dispatched from refs/heads/main." >&2
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "version must be a v-prefixed semantic version." >&2
            exit 1
          fi

          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "digest must match sha256:<64 lowercase hexadecimal characters>." >&2
            exit 1
          fi

          printf 'Signing immutable target %s@%s for release %s\n' \
            "$IMAGE" "$IMAGE_DIGEST" "$RELEASE_VERSION"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Authenticate to the private GHCR package
        shell: bash
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          test -n "$REGISTRY_TOKEN"
          printf '%s' "$REGISTRY_TOKEN" | \
            docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Sign the immutable digest
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          IMAGE_DIGEST: ${{ inputs.digest }}
        run: |
          set -Eeuo pipefail
          target="${IMAGE}@${IMAGE_DIGEST}"

          cosign sign \
            --yes \
            --oidc-provider=github-actions \
            --annotations "org.opencontainers.image.version=${RELEASE_VERSION}" \
            --annotations "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            "$target"

      - name: Verify the exact signature identity and claims
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          IMAGE_DIGEST: ${{ inputs.digest }}
        run: |
          set -Eeuo pipefail
          target="${IMAGE}@${IMAGE_DIGEST}"

          cosign verify \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
            --certificate-github-workflow-repository "$GITHUB_REPOSITORY" \
            --certificate-github-workflow-ref "$GITHUB_REF" \
            --certificate-github-workflow-sha "$GITHUB_SHA" \
            --certificate-github-workflow-trigger workflow_dispatch \
            --annotations "org.opencontainers.image.version=${RELEASE_VERSION}" \
            --annotations "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            "$target"

      - name: Remove the GHCR credential
        if: ${{ always() }}
        shell: bash
        run: docker logout ghcr.io >/dev/null 2>&1 || true
